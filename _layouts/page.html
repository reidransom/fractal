---
layout: default
---
{%- include header.html -%}

<div id="wrapper">
  <section id="main" class="wrapper style1">
    <div class="inner">
      {%- if page.heading %}
      <h1>{{ page.heading }}</h1>
      {%- endif %}
      {%- if page.hero_image %}
      <span class="image fit"><img src="{{ page.hero_image | relative_url }}" alt="" /></span>
      {%- endif %}
      {{ content }}
    </div>
  </section>
</div>
